<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>TwoTrack</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --blue:        #2563EB;
      --blue-light:  #3B82F6;
      --blue-glow:   rgba(37,99,235,0.3);
      --green:       #059669;
      --green-light: #10B981;
      --green-glow:  rgba(5,150,105,0.3);
      --red:         #EF4444;
      --bg:          #0B0F1A;
      --surface:     rgba(13,18,30,0.94);
      --border:      rgba(255,255,255,0.09);
      --text:        #EEF2FF;
      --muted:       rgba(238,242,255,0.42);
      --bar-h:       56px;
      --ff:          'Syne', sans-serif;
      --ffm:         'DM Mono', monospace;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; width:100%; overflow:hidden; background:var(--bg); font-family:var(--ff); color:var(--text); }

    /* MAP */
    #map {
      position:fixed; inset:0;
      top:var(--bar-h); bottom:var(--bar-h);
      z-index:0;
    }
    .leaflet-tile {
      filter: brightness(0.68) saturate(0.75) hue-rotate(180deg) invert(1) contrast(0.88);
    }
    .leaflet-control-attribution {
      font-family:var(--ffm)!important; font-size:9px!important;
      background:rgba(11,15,26,0.8)!important; color:var(--muted)!important;
    }
    .leaflet-control-attribution a { color:var(--muted)!important; }
    .leaflet-control-zoom a {
      background:var(--surface)!important; color:var(--text)!important;
      border-color:var(--border)!important; font-family:var(--ff)!important;
    }
    @media (max-width:480px) { .leaflet-control-zoom { display:none; } }

    /* TOP BAR */
    #topbar {
      position:fixed; inset:0 0 auto 0; height:var(--bar-h); z-index:1000;
      background:var(--surface); backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; padding:0 16px; gap:10px;
    }
    #brand {
      font-size:17px; font-weight:800; letter-spacing:-0.5px;
      display:flex; align-items:center; gap:7px; flex-shrink:0;
    }
    #brand-icon {
      width:28px; height:28px; border-radius:8px;
      background:linear-gradient(135deg,var(--blue),var(--green));
      display:flex; align-items:center; justify-content:center; font-size:14px;
    }
    .pill {
      display:inline-flex; align-items:center; gap:5px;
      padding:4px 10px; border-radius:100px;
      font-family:var(--ffm); font-size:11px;
      border:1px solid var(--border); background:rgba(255,255,255,0.04);
      white-space:nowrap;
    }
    #status-dot {
      width:7px; height:7px; border-radius:50%; flex-shrink:0;
      background:var(--red); transition:background 0.4s, box-shadow 0.4s;
    }
    #status-dot.live {
      background:var(--green-light);
      box-shadow:0 0 0 3px var(--green-glow);
      animation:pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow:0 0 0 3px var(--green-glow); }
      50%      { box-shadow:0 0 0 7px rgba(16,185,129,0); }
    }
    #room-pill { font-family:var(--ffm); font-size:11px; color:var(--muted); letter-spacing:0.5px; flex-shrink:0; }

    /* BOTTOM BAR */
    #bottombar {
      position:fixed; inset:auto 0 0 0; height:var(--bar-h); z-index:1000;
      background:var(--surface); backdrop-filter:blur(20px) saturate(180%);
      border-top:1px solid var(--border);
      display:flex; align-items:center; gap:8px; padding:8px 12px;
    }
    .btn {
      flex:1; height:40px; border:none; border-radius:10px;
      font-family:var(--ff); font-size:14px; font-weight:700;
      cursor:pointer; transition:transform 0.1s, opacity 0.1s;
      display:flex; align-items:center; justify-content:center; gap:5px;
    }
    .btn:active { transform:scale(0.95); opacity:0.8; }
    #share-btn  { background:var(--blue); color:#fff; box-shadow:0 0 18px var(--blue-glow); }
    #me-btn, #both-btn { background:rgba(255,255,255,0.07); color:var(--text); border:1px solid var(--border); }

    /* MODALS */
    .overlay {
      position:fixed; inset:0; z-index:5000;
      background:rgba(11,15,26,0.88); backdrop-filter:blur(10px);
      display:flex; align-items:center; justify-content:center; padding:24px;
      transition:opacity 0.25s;
    }
    .overlay.off { opacity:0; pointer-events:none; }
    .card {
      background:#111827; border:1px solid var(--border); border-radius:20px;
      padding:28px 22px; max-width:340px; width:100%; text-align:center;
      box-shadow:0 24px 80px rgba(0,0,0,0.65);
      transition:transform 0.25s;
    }
    .overlay.off .card { transform:translateY(16px); }
    .card-icon { font-size:38px; margin-bottom:10px; display:block; }
    .card h2 { font-size:21px; font-weight:800; letter-spacing:-0.4px; margin-bottom:8px; }
    .card p  { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:18px; }
    .card-btn {
      width:100%; padding:13px; border:none; border-radius:12px;
      font-family:var(--ff); font-size:15px; font-weight:700; cursor:pointer;
      background:var(--blue); color:#fff; box-shadow:0 0 22px var(--blue-glow);
      transition:transform 0.1s, opacity 0.1s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .card-btn:active { transform:scale(0.97); opacity:0.88; }
    .card-btn.sec {
      margin-top:9px; background:rgba(255,255,255,0.06);
      color:var(--text); box-shadow:none; border:1px solid var(--border);
    }
    .share-code {
      background:rgba(255,255,255,0.05); border:1px solid var(--border);
      border-radius:10px; padding:11px 14px; margin-bottom:12px;
      font-family:var(--ffm); font-size:22px; letter-spacing:4px;
      color:var(--blue-light); text-align:center; word-break:break-all;
    }
    .share-url {
      background:rgba(255,255,255,0.03); border:1px solid var(--border);
      border-radius:9px; padding:9px 11px; margin-bottom:14px;
      font-family:var(--ffm); font-size:10px; color:var(--muted);
      word-break:break-all; text-align:left; line-height:1.6;
    }

    /* TOAST */
    #toast {
      position:fixed; bottom:calc(var(--bar-h) + 12px); left:50%;
      transform:translateX(-50%) translateY(6px);
      z-index:6000; pointer-events:none;
      background:#1b2640; color:var(--text); font-family:var(--ffm); font-size:12px;
      padding:8px 16px; border-radius:100px; border:1px solid rgba(37,99,235,0.3);
      opacity:0; transition:opacity 0.2s, transform 0.2s; white-space:nowrap;
    }
    #toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

    /* RECONNECT BANNER */
    #banner {
      position:fixed; top:calc(var(--bar-h) + 10px); left:50%; transform:translateX(-50%);
      z-index:900; pointer-events:none;
      background:rgba(239,68,68,0.13); border:1px solid rgba(239,68,68,0.32);
      color:#FCA5A5; font-family:var(--ffm); font-size:11px;
      padding:6px 14px; border-radius:100px; backdrop-filter:blur(8px);
      opacity:0; transition:opacity 0.3s; white-space:nowrap;
    }
    #banner.on { opacity:1; }

    /* LEGEND */
    #legend {
      position:fixed; top:calc(var(--bar-h) + 10px); right:10px; z-index:500;
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:8px 12px; backdrop-filter:blur(12px);
      display:flex; flex-direction:column; gap:5px;
    }
    .leg { display:flex; align-items:center; gap:7px; font-family:var(--ffm); font-size:11px; color:var(--muted); }
    .leg-dot { width:10px; height:10px; border-radius:50%; border:2px solid rgba(255,255,255,0.6); flex-shrink:0; }
    @media (max-width:480px) { #legend { display:none; } }
  </style>
</head>
<body>

<div id="topbar">
  <div id="brand"><div id="brand-icon">⟡</div>TwoTrack</div>
  <div class="pill">
    <span id="status-dot"></span>
    <span id="status-text">Starting…</span>
  </div>
  <div id="room-pill">—</div>
</div>

<div id="map"></div>

<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:#2563EB"></div>You</div>
  <div class="leg"><div class="leg-dot" style="background:#059669"></div>Friend</div>
</div>

<div id="banner">⚠ Reconnecting…</div>

<div id="bottombar">
  <button class="btn" id="share-btn" onclick="openShare()">↑ Share</button>
  <button class="btn" id="me-btn"   onclick="centerMe()">◎ Me</button>
  <button class="btn" id="both-btn" onclick="fitBoth()">⊡ Both</button>
</div>

<div id="toast"></div>

<!-- MODAL: LOCATION -->
<div class="overlay" id="m-location">
  <div class="card">
    <span class="card-icon">📍</span>
    <h2>Allow location</h2>
    <p>Grant location access so your friend can see you moving on the map. Sharing stops when you close this tab.</p>
    <button class="card-btn" onclick="startLocation()">Allow Location</button>
  </div>
</div>

<!-- MODAL: SHARE -->
<div class="overlay off" id="m-share">
  <div class="card">
    <span class="card-icon">🔗</span>
    <h2>Invite your friend</h2>
    <p>Send them this link. You'll both appear on each other's map the moment they open it.</p>
    <div class="share-code" id="s-code"></div>
    <div class="share-url"  id="s-url"></div>
    <button class="card-btn" onclick="doShare()">↑ Share Link</button>
    <button class="card-btn sec" onclick="closeShare()">Dismiss</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════
//  TWOTRACK — GitHub Pages edition. All 13 bugs fixed:
//
//  FIX 1  — ICE / TURN: Added 4× Google STUN + Open Relay TURN servers.
//            Without TURN, both users on mobile data (symmetric NAT) would
//            never establish a DataChannel.
//
//  FIX 2  — unavailable-id loop: host now generates a NEW ROOM on conflict
//            instead of retrying the same dead peer ID forever.
//
//  FIX 3  — MY_PEER_ID / OPP_PEER_ID changed from const → let so the host
//            can reassign them after generating a new room.
//
//  FIX 4  — IS_HOST guard on peer.on('connection'): guest now rejects any
//            unexpected incoming connection instead of tearing down its own.
//
//  FIX 5  — Keepalive ping every 15 s detects zombie DataChannels caused by
//            mobile browsers backgrounding the tab. Auto-reconnects on stale.
//
//  FIX 6  — scheduleConnect now uses exponential back-off (2.5 s → 10 s max)
//            to avoid flooding the PeerJS signalling server on slow starts.
//
//  FIX 7  — Reconnect banner no longer hides on a fixed 4 s timeout; it stays
//            until peer.on('open') fires confirming the server is reachable.
//
//  FIX 8  — initPeer timeout: if 0.peerjs.com is unreachable the status
//            updates after 20 s with a user-visible error and retry button.
//
//  FIX 9  — Guest peer-unavailable now sets status to "Waiting for host…"
//            so the user knows polling is happening, not that the app broke.
//
//  FIX 10 — setupConn opening-state race: pending-but-not-yet-open conns are
//            tracked and rejected so two parallel DataChannels can't form.
//
//  FIX 11 — ping / pong message type added. Both sides respond to pings so
//            the keepalive round-trip confirms liveness in both directions.
//
//  FIX 12 — openShare() now builds the URL explicitly from location.origin +
//            pathname + '#' + ROOM so it is always correct after room changes.
//
//  FIX 13 — status text "Waiting for host…" added for the guest polling state
//            so the UI accurately reflects what the app is doing.
// ═══════════════════════════════════════════════════════════════════════

// ── TURN / STUN ICE SERVER CONFIG (FIX 1) ─────────────────────────────
// Multiple Google STUN servers + Open Relay TURN for carrier-grade NAT.
// Without TURN, two users on different mobile carriers would silently fail.
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302'  },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun2.l.google.com:19302' },
  { urls: 'stun:stun3.l.google.com:19302' },
  {
    // Open Relay Project — free public TURN servers for NAT traversal.
    urls: [
      'turn:openrelay.metered.ca:80',
      'turn:openrelay.metered.ca:443',
      'turn:openrelay.metered.ca:443?transport=tcp',
      'turn:openrelay.metered.ca:80?transport=tcp',
    ],
    username:   'openrelayproject',
    credential: 'openrelayproject',
  },
];

// ── ROOM ───────────────────────────────────────────────────────────────
// Hash in the URL IS the room code. If absent, this tab is the host and
// generates a new room. The guest's URL always contains the host's hash.
let ROOM = window.location.hash.replace('#', '');
const IS_HOST = !ROOM;
if (!ROOM) {
  ROOM = Math.random().toString(36).substring(2, 10);
  window.location.hash = ROOM;
}

// FIX 3: let (not const) so host can reassign on unavailable-id collision.
let MY_PEER_ID  = `tt2-${ROOM}-${IS_HOST ? 'a' : 'b'}`;
let OPP_PEER_ID = `tt2-${ROOM}-${IS_HOST ? 'b' : 'a'}`;

// ── STATE ──────────────────────────────────────────────────────────────
let map, myMarker, friendMarker, myLine, friendLine, accCircle;
let peer          = null;
let conn          = null;       // active DataChannel (or null)
let pendingConn   = null;       // FIX 10: connection in opening state
let geoWatchId    = null;
let retryTimer    = null;
let keepaliveTimer= null;
let peerInitTimer = null;       // FIX 8: timeout for PeerJS server connect
let retryCount    = 0;          // FIX 6: exponential backoff counter
let hasMyPos      = false;
let hasFriendPos  = false;
let lastPos       = null;       // [lat, lng]

const MY_KEY  = `tt_m_${ROOM}`;
const FR_KEY  = `tt_f_${ROOM}`;
const MAX_PTS = 1000;

let myPts = loadPts(MY_KEY);
let frPts = loadPts(FR_KEY);

function loadPts(k) {
  try { return JSON.parse(sessionStorage.getItem(k) || '[]'); } catch(e) { return []; }
}
function savePts(k, arr) {
  try { sessionStorage.setItem(k, JSON.stringify(arr)); } catch(e) {}
}

// ── MAP ────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl:true, attributionControl:true }).setView([20, 0], 2);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom:19,
  }).addTo(map);

  myMarker = L.circleMarker([0, 0], {
    radius:9, fillColor:'#2563EB', color:'#fff', weight:2.5, fillOpacity:0, opacity:0,
  }).addTo(map).bindTooltip('You', { direction:'top' });

  friendMarker = L.circleMarker([0, 0], {
    radius:9, fillColor:'#059669', color:'#fff', weight:2.5, fillOpacity:0, opacity:0,
  }).addTo(map).bindTooltip('Friend', { direction:'top' });

  myLine     = L.polyline(myPts, { color:'#2563EB', weight:3.5, opacity:0.65 }).addTo(map);
  friendLine = L.polyline(frPts, { color:'#059669', weight:3.5, opacity:0.65 }).addTo(map);

  if (myPts.length > 1) {
    try { map.fitBounds(myLine.getBounds(), { padding:[60,60] }); } catch(e) {}
  }
}

// ── GEOLOCATION ────────────────────────────────────────────────────────
function startLocation() {
  off('m-location');
  if (!navigator.geolocation) { toast('Geolocation not supported'); return; }
  setStatus('Getting GPS…', false);
  geoWatchId = navigator.geolocation.watchPosition(onGPS, onGPSErr,
    { enableHighAccuracy:true, maximumAge:4000, timeout:15000 });
}

function onGPS(p) {
  const lat = p.coords.latitude;
  const lng = p.coords.longitude;
  const acc = p.coords.accuracy;

  myMarker.setLatLng([lat, lng]);
  myMarker.setStyle({ fillOpacity:1, opacity:1 });

  if (accCircle) accCircle.remove();
  accCircle = L.circle([lat, lng], {
    radius:acc, color:'#2563EB', fillColor:'#2563EB', fillOpacity:0.06, weight:1,
  }).addTo(map);

  myPts.push([lat, lng]);
  if (myPts.length > MAX_PTS) myPts = myPts.slice(-MAX_PTS);
  myLine.setLatLngs(myPts);
  savePts(MY_KEY, myPts);

  lastPos = [lat, lng];

  if (!hasMyPos) {
    hasMyPos = true;
    map.setView([lat, lng], 16);
    refreshStatus();
  }

  sendPos(lat, lng);
}

function onGPSErr(e) {
  const msg = e.code === 1 ? 'Location denied'
            : e.code === 2 ? 'Location unavailable' : 'GPS timeout';
  setStatus(msg, false); toast(msg);
}

// ── PEERJS ─────────────────────────────────────────────────────────────
//
// Connection flow (one-sided initiation prevents simultaneous-connect races):
//
//   Host  (IS_HOST=true):  registers MY_PEER_ID, waits for peer.on('connection').
//   Guest (IS_HOST=false): registers MY_PEER_ID, then polls peer.connect(OPP).
//
// Only the GUEST ever calls peer.connect(). The HOST only ever accepts.
// Guest retries with back-off until host is reachable, then DataChannel opens.
// On DataChannel close: guest re-initiates; host waits for new incoming.

function initPeer() {
  setStatus('Connecting…', false);
  clearTimeout(peerInitTimer);
  clearTimeout(retryTimer);
  stopKeepalive();

  if (peer && !peer.destroyed) { try { peer.destroy(); } catch(e) {} }
  peer = null; conn = null; pendingConn = null;

  peer = new Peer(MY_PEER_ID, {
    debug: 0,
    config: { iceServers: ICE_SERVERS },  // FIX 1: STUN + TURN
  });

  // FIX 8: If the PeerJS server is unreachable, peer.on('open') never fires.
  // After 20 s, show a user-facing error and schedule a retry.
  peerInitTimer = setTimeout(() => {
    if (peer && !peer.open) {
      setStatus('Server unreachable — retrying…', false);
      toast('PeerJS server timeout. Retrying…', 4000);
      setTimeout(initPeer, 5000);
    }
  }, 20000);

  peer.on('open', () => {
    clearTimeout(peerInitTimer);
    // FIX 7: Banner is hidden here (on confirmed server open), not on a timer.
    showBanner(false);
    // FIX 12: Build share URL explicitly so it's always correct.
    document.getElementById('room-pill').textContent = ROOM.toUpperCase();
    refreshStatus();
    if (!IS_HOST) scheduleConnect(); // guest starts polling
  });

  // FIX 4: IS_HOST guard — guest rejects any unexpected incoming connection.
  peer.on('connection', (c) => {
    if (!IS_HOST) {
      console.warn('Guest received unexpected incoming connection — rejecting');
      try { c.close(); } catch(e) {}
      return;
    }
    // Host: tear down stale conn and accept the new one from the guest.
    teardown();
    setupConn(c);
  });

  peer.on('error', (err) => {
    console.warn('peer error:', err.type, err.message);

    if (err.type === 'peer-unavailable') {
      // FIX 9: Guest polling for host — update status so user isn't confused.
      if (!IS_HOST) setStatus('Waiting for host…', false);
      scheduleConnect(); // guest keeps polling with back-off

    } else if (err.type === 'unavailable-id') {
      // FIX 2 + FIX 3: Don't retry the same dead ID — host generates new room.
      if (IS_HOST) {
        toast('Room ID busy — generating new…', 3500);
        ROOM        = Math.random().toString(36).substring(2, 10);
        window.location.hash = ROOM;
        MY_PEER_ID  = `tt2-${ROOM}-a`;
        OPP_PEER_ID = `tt2-${ROOM}-b`;
        document.getElementById('room-pill').textContent = ROOM.toUpperCase();
        setTimeout(initPeer, 800);
      } else {
        // Guest can't change the room — wait for PeerJS to expire the stale ID.
        toast('Room full or busy. Retrying…', 4000);
        setTimeout(initPeer, 10000);
      }

    } else {
      showBanner(true);
      // FIX 7: Banner stays until reconnect confirmed, not on a 4 s timer.
      setTimeout(initPeer, 5000);
    }
  });

  peer.on('disconnected', () => {
    showBanner(true);
    stopKeepalive();
    if (peer && !peer.destroyed) {
      try { peer.reconnect(); } catch(e) {}
      // FIX 7: Banner hides only when peer.on('open') confirms reconnection.
    }
  });

  peer.on('close', () => {
    console.log('peer destroyed');
    showBanner(true);
    setTimeout(initPeer, 3000);
  });
}

// ── GUEST CONNECTION POLLING ───────────────────────────────────────────
// FIX 6: Exponential back-off — starts at 2.5 s, caps at 10 s.
const RETRY_BASE_MS = 2500;
const RETRY_MAX_MS  = 10000;

function scheduleConnect() {
  clearTimeout(retryTimer);
  if (conn && conn.open) return;  // already live — nothing to do

  const delay = Math.min(RETRY_BASE_MS * Math.pow(1.4, retryCount), RETRY_MAX_MS);

  retryTimer = setTimeout(() => {
    if (conn && conn.open) return;
    if (!peer || peer.destroyed || !peer.open) return;

    // FIX 10: Reject if a connection is already in opening state.
    if (pendingConn) {
      console.log('Already have a pending conn — skipping duplicate connect');
      return;
    }

    retryCount++;
    console.log(`Connecting to ${OPP_PEER_ID} (attempt ${retryCount}, delay was ${Math.round(delay)}ms)`);
    const c = peer.connect(OPP_PEER_ID, { serialization: 'json' });
    if (c) {
      pendingConn = c;
      setupConn(c);
    }
  }, delay);
}

// ── DATA CHANNEL SETUP ─────────────────────────────────────────────────
function setupConn(c) {
  // FIX 10: Guard against opening-state race (conn not yet .open but exists).
  if ((conn && conn.open) || (pendingConn && pendingConn !== c)) {
    console.warn('Rejecting duplicate connection attempt');
    try { c.close(); } catch(e) {}
    return;
  }
  conn = c;
  pendingConn = c;

  conn.on('open', () => {
    pendingConn = null;
    retryCount  = 0;   // FIX 6: reset back-off on success
    console.log('DataChannel open');
    showBanner(false);
    refreshStatus();
    startKeepalive();  // FIX 5: begin liveness monitoring

    // Catch-up: immediately send our position + full trail to friend.
    if (lastPos) sendPos(lastPos[0], lastPos[1]);
    if (myPts.length > 0) safeSend({ type:'trail', pts: myPts });
  });

  conn.on('data', (raw) => {
    try {
      const d = (typeof raw === 'string') ? JSON.parse(raw) : raw;
      if (d.type === 'pos')   onFriendPos(d.lat, d.lng);
      if (d.type === 'trail') onFriendTrail(d.pts);
      // FIX 11: Keepalive ping/pong round-trip.
      if (d.type === 'ping')  safeSend({ type:'pong', ts: d.ts });
      // pong: receipt confirms both directions alive — no further action needed.
    } catch(e) { console.warn('bad data', e); }
  });

  conn.on('close', () => {
    console.log('DataChannel closed');
    conn = null; pendingConn = null;
    stopKeepalive();
    refreshStatus();
    showBanner(true);
    setTimeout(() => {
      showBanner(false);
      if (!IS_HOST) scheduleConnect(); // guest re-initiates
      // Host passively waits for guest to reconnect via peer.on('connection').
    }, 3000);
  });

  conn.on('error', (err) => {
    console.warn('conn error', err);
    conn = null; pendingConn = null;
    stopKeepalive();
    refreshStatus();
    if (!IS_HOST) scheduleConnect();
  });
}

function teardown() {
  if (conn)        { try { conn.close();        } catch(e) {} conn        = null; }
  if (pendingConn) { try { pendingConn.close(); } catch(e) {} pendingConn = null; }
  stopKeepalive();
}

// ── KEEPALIVE (FIX 5 + FIX 11) ────────────────────────────────────────
// Sends a ping every 15 s to detect zombie DataChannels.
// Mobile browsers freeze JS when backgrounded; the channel stays "open"
// but is actually dead. Without this, the app shows "Live" indefinitely.
const KEEPALIVE_MS = 15000;

function startKeepalive() {
  stopKeepalive();
  keepaliveTimer = setInterval(() => {
    if (conn && conn.open) {
      safeSend({ type:'ping', ts: Date.now() });
    } else {
      // Channel is gone but we didn't get a close event (mobile freeze).
      console.warn('Keepalive: channel dead — reconnecting');
      stopKeepalive();
      conn = null; pendingConn = null;
      refreshStatus();
      if (!IS_HOST) scheduleConnect();
    }
  }, KEEPALIVE_MS);
}

function stopKeepalive() {
  clearInterval(keepaliveTimer);
  keepaliveTimer = null;
}

// ── SEND HELPERS ───────────────────────────────────────────────────────
function sendPos(lat, lng) {
  safeSend({ type:'pos', lat, lng, ts: Date.now() });
}

function safeSend(data) {
  if (conn && conn.open) { try { conn.send(data); } catch(e) {} }
}

// ── INCOMING FROM FRIEND ───────────────────────────────────────────────
function onFriendPos(lat, lng) {
  friendMarker.setLatLng([lat, lng]);
  friendMarker.setStyle({ fillOpacity:1, opacity:1 });

  frPts.push([lat, lng]);
  if (frPts.length > MAX_PTS) frPts = frPts.slice(-MAX_PTS);
  friendLine.setLatLngs(frPts);
  savePts(FR_KEY, frPts);

  if (!hasFriendPos) { hasFriendPos = true; refreshStatus(); }
}

function onFriendTrail(pts) {
  if (!Array.isArray(pts) || pts.length === 0) return;
  if (pts.length > frPts.length) {
    frPts = pts.slice(-MAX_PTS);
    friendLine.setLatLngs(frPts);
    savePts(FR_KEY, frPts);
    if (frPts.length > 0) {
      friendMarker.setLatLng(frPts[frPts.length - 1]);
      friendMarker.setStyle({ fillOpacity:1, opacity:1 });
      hasFriendPos = true;
      refreshStatus();
    }
  }
}

// ── STATUS ─────────────────────────────────────────────────────────────
function refreshStatus() {
  const peerReady = !!(peer && peer.open);
  const connOpen  = !!(conn && conn.open);

  let txt, live;
  if (!peerReady)        { txt = 'Connecting…';         live = false; }
  else if (!hasMyPos)    { txt = 'Waiting for GPS…';    live = false; }
  else if (!connOpen)    {
    // FIX 13: Distinguish host-waiting vs guest-waiting state.
    txt = IS_HOST ? 'Waiting for friend…' : 'Waiting for host…';
    live = false;
  }
  else if (!hasFriendPos){ txt = 'Friend connected…';   live = true;  }
  else                   { txt = 'Live';                 live = true;  }

  setStatus(txt, live);
}

function setStatus(txt, live) {
  document.getElementById('status-text').textContent = txt;
  const dot = document.getElementById('status-dot');
  live ? dot.classList.add('live') : dot.classList.remove('live');
}

function showBanner(v) {
  document.getElementById('banner').classList.toggle('on', v);
}

// ── MAP CONTROLS ───────────────────────────────────────────────────────
function centerMe() {
  if (lastPos) map.setView(lastPos, Math.max(map.getZoom(), 16), { animate:true });
  else toast('No GPS fix yet');
}
function fitBoth() {
  const all = [...myPts, ...frPts];
  if (!all.length) { toast('No positions yet'); return; }
  map.fitBounds(L.latLngBounds(all), { padding:[60,60], animate:true });
}

// ── SHARE (FIX 12) ────────────────────────────────────────────────────
// Build URL explicitly from origin + pathname + hash so it's always
// correct even if ROOM was regenerated after page load.
function shareURL() {
  return `${location.origin}${location.pathname}#${ROOM}`;
}

function openShare() {
  const url = shareURL();
  document.getElementById('s-code').textContent = ROOM.toUpperCase();
  document.getElementById('s-url').textContent  = url;
  on('m-share');
}
function closeShare() { off('m-share'); }
function doShare() {
  const url = shareURL();
  if (navigator.share) {
    navigator.share({ title:'TwoTrack — see my location', url })
      .then(closeShare).catch(() => copyURL(url));
  } else { copyURL(url); }
}
function copyURL(url) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => { toast('Link copied!'); closeShare(); });
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = url; ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  toast('Link copied!'); closeShare();
}

// ── HELPERS ────────────────────────────────────────────────────────────
function on(id)  { document.getElementById(id).classList.remove('off'); }
function off(id) { document.getElementById(id).classList.add('off'); }

let _tt;
function toast(msg, ms=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('on'), ms);
}

// ── CLEANUP ────────────────────────────────────────────────────────────
window.addEventListener('beforeunload', () => {
  clearTimeout(retryTimer);
  clearTimeout(peerInitTimer);
  stopKeepalive();
  if (geoWatchId !== null) navigator.geolocation.clearWatch(geoWatchId);
  teardown();
  if (peer && !peer.destroyed) try { peer.destroy(); } catch(e) {}
});

// ── BOOT ───────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  initPeer();
});
</script>
